  # ── Monatliche Deltas (Zählerstand Ende - Anfang Monat) ──────────────────
  - platform: sql
    db_url: mysql://gh:a12345@192.168.178.218/wagodb
    scan_interval: 3600
    queries:

      - name: pv_m00_bezug
        query: &bezug_query >
          SELECT ROUND(bezug - LAG(bezug) OVER (ORDER BY monat), 1) AS bezug_kwh FROM (
            SELECT substr(datum,1,7) AS monat, MAX(bezug) AS bezug
            FROM pv_zaehl2 GROUP BY 1
          ) t ORDER BY monat DESC LIMIT 1 OFFSET 0
