# HA Package: PV monatliche Zähler aus pv_zaehl2
# Einfügen in configuration.yaml:
#   homeassistant:
#     packages:
#       pv_monthly: !include packages/pv_monthly.yaml

sensor:
  # ── Monat-Label ──────────────────────────────────────────────────────────
  - platform: sql
    db_url: mysql://gh:a12345@192.168.178.218/wagodb
    scan_interval: 3600
    queries:

      # Aktueller Monat
      - name: pv_m00_monat
        query: >
          SELECT monat FROM (
            SELECT substr(datum,1,7) AS monat FROM pv_zaehl2
            GROUP BY 1 ORDER BY 1 DESC LIMIT 1 OFFSET 0
          ) t
        column: monat

      - name: pv_m01_monat
