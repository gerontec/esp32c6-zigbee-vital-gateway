  # ── Peak-Leistung pro Monat (min wirkleist = max Einspeisung, in kWp) ────
  - platform: sql
    db_url: mysql://gh:a12345@192.168.178.218/wagodb
    scan_interval: 3600
    queries:

      - name: pv_m00_kwp
        query: >
          SELECT ROUND(ABS(MIN(wirkleist)) / 1000, 2) AS kwp FROM (
            SELECT substr(datum,1,7) AS monat, MIN(wirkleist) AS wirkleist
            FROM pv_zaehl2 GROUP BY 1
